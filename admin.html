<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px; }
        .container { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); max-width: 1000px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #003366; padding-bottom: 10px; margin-bottom: 20px; }
        .header h2 { margin: 0; color: #003366; }
        .btn-group button { padding: 10px 15px; margin-left: 5px; border: none; border-radius: 4px; color: white; cursor: pointer; font-weight: bold; }
        .btn-excel { background-color: #28a745; }
        .btn-excel:hover { background-color: #218838; }
        .btn-pdf { background-color: #dc3545; }
        .btn-pdf:hover { background-color: #c82333; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #003366; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
    </style>
    
    <!-- Script untuk Export Excel & PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Admin Dashboard - Rekod Permohonan</h2>
        <div class="btn-group">
            <button class="btn-excel" onclick="exportExcel()">📊 Export Excel</button>
            <button class="btn-pdf" onclick="exportPDF()">📄 Export PDF</button>
        </div>
    </div>

    <!-- Kotak Jadual untuk PDF -->
    <div id="table-container">
        <table id="dataTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nama Pemohon</th>
                    <th>No. Telefon</th>
                    <th>Tarikh Borang Dihantar</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="4" style="text-align:center;">Memuat turun data dari Cloudflare...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // Tarik data dari sistem Cloudflare
    fetch('./api/data')
        .then(response => response.json())
        .then(data => {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = ''; // Kosongkan mesej "Memuat turun..."
            
            if(data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">Belum ada sebarang rekod permohonan.</td></tr>';
                return;
            }

            // Masukkan data satu persatu ke dalam jadual
            data.forEach(row => {
                const tarikh = new Date(row.submitted_at).toLocaleString('ms-MY'); // Format tarikh Malaysia
                tbody.innerHTML += `
                    <tr>
                        <td>${row.id}</td>
                        <td>${row.name}</td>
                        <td>${row.phone}</td>
                        <td>${tarikh}</td>
                    </tr>
                `;
            });
        })
        .catch(error => {
            document.getElementById('tableBody').innerHTML = `<tr><td colspan="4" style="color:red;">Ralat: ${error.message}</td></tr>`;
        });

    // --- FUNGSI EXPORT EXCEL ---
    function exportExcel() {
        let table = document.getElementById("dataTable");
        let wb = XLSX.utils.table_to_book(table, {sheet: "Data Permohonan"});
        XLSX.writeFile(wb, "Senarai_Permohonan.xlsx");
    }

    // --- FUNGSI EXPORT PDF ---
    function exportPDF() {
        let element = document.getElementById("table-container");
        let opt = {
            margin:       0.5,
            filename:     'Senarai_Permohonan.pdf',
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2 },
            jsPDF:        { unit: 'in', format: 'a4', orientation: 'landscape' }
        };
        // Mula proses convert
        html2pdf().set(opt).from(element).save();
    }
</script>

</body>
</html>
